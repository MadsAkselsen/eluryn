name: CI

on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . --cache

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit -- --run

      - name: Build
        run: npm run build-only

  backend-projects:
    name: Discover Backend Projects
    runs-on: ubuntu-latest
    outputs:
      service_projects: ${{ steps.projects.outputs.service_projects }}
      all_projects: ${{ steps.projects.outputs.all_projects }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build project matrix
        id: projects
        shell: bash
        run: |
          set -euo pipefail
          service_projects="$(jq -c '.backend_services | map({ id, project })' .github/service-manifest.json)"
          all_projects="$(find backend -type f -name '*.csproj' ! -path '*/obj/*' | sort | jq -R -s -c 'split("\n")[:-1] | map({
            id: (split("/")[-1] | sub("\\.csproj$"; "")),
            project: .
          })')"

          echo "service_projects=${service_projects}" >> "$GITHUB_OUTPUT"
          echo "all_projects=${all_projects}" >> "$GITHUB_OUTPUT"

  backend-format:
    name: Backend Formatting (${{ matrix.project.id }})
    runs-on: ubuntu-latest
    needs:
      - backend-projects
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.backend-projects.outputs.all_projects) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore "${{ matrix.project.project }}"

      - name: Verify formatting
        run: dotnet format "${{ matrix.project.project }}" --verify-no-changes --no-restore

  backend-build:
    name: Backend CI (${{ matrix.project.id }})
    runs-on: ubuntu-latest
    needs:
      - backend-projects
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.backend-projects.outputs.service_projects) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "${{ matrix.project.project }}"

      - name: Build
        run: dotnet build "${{ matrix.project.project }}" --configuration Release --no-restore

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t test_projects < <(find backend -type f \( -name '*Tests.csproj' -o -name '*Test.csproj' \) | sort)

          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No backend test projects found."
            exit 0
          fi

          for project in "${test_projects[@]}"; do
            dotnet test "$project" --configuration Release
          done
