services:
  traefik:
    image: traefik:v3.6.7
    networks:
      edge:
        ipv4_address: 172.20.0.10 # static IP for traefik in edge network so backend services can add it to known proxies
      internal:
        ipv4_address: 172.21.0.10
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true

      # Define security headers middleware
      - traefik.http.middlewares.sec-headers.headers.framedeny=true # Meaning: your site can’t be embedded in an <iframe> anywhere
      - traefik.http.middlewares.sec-headers.headers.contenttypenosniff=true # Protects against MIME type sniffing vulnerabilities
      - traefik.http.middlewares.sec-headers.headers.referrerpolicy=no-referrer # No referrer information is sent along with requests
      - traefik.http.middlewares.sec-headers.headers.permissionspolicy=geolocation=(),microphone=(),camera=()

      # HSTS (prod only — don’t do this on localhost)
      # - traefik.http.middlewares.sec-headers.headers.stsSeconds=31536000
      # - traefik.http.middlewares.sec-headers.headers.stsIncludeSubdomains=true
      # - traefik.http.middlewares.sec-headers.headers.stsPreload=true
    command:
      # when routing to containers, use the internal network IPs
      - --providers.docker.network=eluryn-internal
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - "--entrypoints.websecure.http.tls=true"
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      # redirect all http to https
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      # make sure the redirect sceheme is https
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Enables Traefik access logs (every request through Traefik gets logged)
      - --accesslog=true

    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik dashboard (local only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ../../certs:/certs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  db:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eluryn"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - internal
    environment:
      POSTGRES_DB: eluryn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - eluryn-db:/var/lib/postgresql/data
      - ./local.db.init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flyway-users:
    image: flyway/flyway:12.0.0
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "-url=jdbc:postgresql://db:5432/eluryn",
        "-user=users_svc",
        "-password=users_pw",
        "-connectRetries=30",
        "-schemas=users",
        "-locations=filesystem:/flyway/sql",
        "migrate"
      ]
    volumes:
      - ../../backend/services/Users/Eluryn.Users.Api/migrations:/flyway/sql:ro

  flyway-pomotimer:
    image: flyway/flyway:12.0.0
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "-url=jdbc:postgresql://db:5432/eluryn",
        "-user=pomotimer_svc",
        "-password=pomo_pw",
        "-connectRetries=30",
        "-schemas=pomotimer",
        "-locations=filesystem:/flyway/sql",
        "migrate"
      ]
    volumes:
      - ../../backend/services/Pomotimer/Eluryn.Pomotimer.Api/migrations:/flyway/sql:ro

  users-api:
    build:
      context: ../../backend/services/Users/Eluryn.Users.Api
    depends_on:
      flyway-users: 
        condition: service_completed_successfully
    networks:
      - internal
    environment:
      ConnectionStrings__Db: Host=db;Port=5432;Database=eluryn;Username=users_svc;Password=users_pw
      ASPNETCORE_ENVIRONMENT: Development
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft.AspNetCore: Warning
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - traefik.enable=true
      # creates a router named "users" that listens to api.localhost/users
      - traefik.http.routers.users.rule=Host(`api.localhost`) && PathPrefix(`/users`)
      # removes the /users prefix when forwarding to the service. So a request to api.localhost/users/weatherforecast becomes /weatherforecast to the service.
      # So it will be forwarded to http://<users-api-container-ip>:8080/weatherforecast.
      - traefik.http.middlewares.users-stripprefix.stripprefix.prefixes=/users
      - traefik.http.services.users.loadbalancer.server.port=8080

      # CORS middleware (local)
      - traefik.http.middlewares.users-cors.headers.accesscontrolalloworiginlist=https://localhost:5173,http://localhost:5173
      - traefik.http.middlewares.users-cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST,DELETE,PATCH
      - traefik.http.middlewares.users-cors.headers.accesscontrolallowheaders=*
      - traefik.http.middlewares.users-cors.headers.addvaryheader=true

      # Router middleware chain (executed in order):
      # - sec-headers: add common security headers
      # - users-stripprefix: remove /users before forwarding to backend
      # - users-cors: allow frontend (localhost:5173) to call the API
      - traefik.http.routers.users.middlewares=sec-headers@docker,users-stripprefix@docker,users-cors@docker

      # This router listens on HTTPS only (port 443 entrypoint) 
      - traefik.http.routers.users.entrypoints=websecure
      # Enables TLS termination for this router
      - traefik.http.routers.users.tls=true

      # Important detail: this healthcheck is from Traefik → service over the internal Docker network, so the path should be /health (NOT /users/health), because Traefik is calling the backend directly.
      - traefik.http.services.users.loadbalancer.healthcheck.path=/health
      - traefik.http.services.users.loadbalancer.healthcheck.interval=10s
      - traefik.http.services.users.loadbalancer.healthcheck.timeout=2s
      - traefik.http.services.users.loadbalancer.healthcheck.scheme=http

      # Attach security headers middleware
      # - traefik.http.routers.users.middlewares=sec-headers@docker,users-stripprefix@docker

  pomotimer-api:
    build:
      context: ../../backend/services/Pomotimer/Eluryn.Pomotimer.Api
    depends_on:
      flyway-pomotimer: 
        condition: service_completed_successfully
    networks:
      - internal
    environment:
      ConnectionStrings__Db: Host=db;Port=5432;Database=eluryn;Username=pomotimer_svc;Password=pomo_pw
      ASPNETCORE_ENVIRONMENT: Development
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft.AspNetCore: Warning
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - traefik.enable=true
      - traefik.http.routers.pomotimer.rule=Host(`api.localhost`) && PathPrefix(`/pomotimer`)
      - traefik.http.middlewares.pomotimer-stripprefix.stripprefix.prefixes=/pomotimer

      - traefik.http.middlewares.pomotimer-cors.headers.accesscontrolalloworiginlist=https://localhost:5173,http://localhost:5173
      - traefik.http.middlewares.pomotimer-cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST,DELETE,PATCH
      - traefik.http.middlewares.pomotimer-cors.headers.accesscontrolallowheaders=*
      - traefik.http.middlewares.pomotimer-cors.headers.addvaryheader=true

      # Attach middlewares to the router.
      # Order matters:
      # 1. sec-headers → add security headers to the response
      # 2. pomotimer-stripprefix → remove /pomotimer before forwarding to the service
      # 3. pomotimer-cors → allow browser requests from the frontend (local dev)
      # "@docker" specifies that the middleware is defined via Docker labels.
      - traefik.http.routers.pomotimer.middlewares=sec-headers@docker,pomotimer-stripprefix@docker,pomotimer-cors@docker

      - traefik.http.routers.pomotimer.entrypoints=websecure
      - traefik.http.routers.pomotimer.tls=true

      # Important detail: this healthcheck is from Traefik → service over the internal Docker network, so the path should be /health (NOT /users/health), because Traefik is calling the backend directly.
      - traefik.http.services.pomotimer.loadbalancer.healthcheck.path=/health
      - traefik.http.services.pomotimer.loadbalancer.healthcheck.interval=10s
      - traefik.http.services.pomotimer.loadbalancer.healthcheck.timeout=2s
      - traefik.http.services.pomotimer.loadbalancer.healthcheck.scheme=http

      - traefik.http.services.pomotimer.loadbalancer.server.port=8080

