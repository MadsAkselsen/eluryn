volumes:
  eluryn-db:

networks:
  edge:
    name: eluryn-edge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  internal:
    name: eluryn-internal
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/16
