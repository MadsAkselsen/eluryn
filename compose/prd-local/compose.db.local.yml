services:
  db:
    image: postgres:16
    container_name: eluryn-db-local
    environment:
      POSTGRES_DB: eluryn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - eluryn-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eluryn"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      db-shared:
        aliases:
          - db

volumes:
  eluryn-db:

networks:
  db-shared:
    name: eluryn-db-shared