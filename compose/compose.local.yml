services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: eluryn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - eluryn-db:/var/lib/postgresql/data
      - ./local.db.init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro

  flyway-users:
    image: flyway/flyway:11.20.1
    depends_on:
      - db
    command:
      [
        "-url=jdbc:postgresql://db:5432/eluryn",
        "-user=users_svc",
        "-password=users_pw",
        "-connectRetries=30",
        "-schemas=users",
        "migrate"
      ]
    volumes:
      - ../backend/services/Users/Eluryn.Users.Api/migrations:/flyway/sql:ro

  flyway-pomotimer:
    image: flyway/flyway:11.20.1
    depends_on:
      - db
    command:
      [
        "-url=jdbc:postgresql://db:5432/eluryn",
        "-user=pomotimer_svc",
        "-password=pomo_pw",
        "-connectRetries=30",
        "-schemas=pomotimer",
        "migrate"
      ]
    volumes:
      - ../backend/services/Pomotimer/Eluryn.Pomotimer.Api/migrations:/flyway/sql:ro

  users-api:
    build:
      context: ../backend/services/Users/Eluryn.Users.Api
    depends_on:
      - flyway-users
    environment:
      ConnectionStrings__Db: Host=db;Port=5432;Database=eluryn;Username=users_svc;Password=users_pw
    ports:
      - "5001:8080"

  pomotimer-api:
    build:
      context: ../backend/services/Pomotimer/Eluryn.Pomotimer.Api
    depends_on:
      - flyway-pomotimer
    environment:
      ConnectionStrings__Db: Host=db;Port=5432;Database=eluryn;Username=pomotimer_svc;Password=pomo_pw
    ports:
      - "5002:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.local
    depends_on:
      - users-api
      - pomotimer-api
    ports:
      - "5173:5173"
    develop:
      watch:
        - path: ../frontend/src
          target: /app/src
          action: sync
        - path: ../frontend/package.json
          target: /app/package.json
          action: restart
        - path: ../frontend/vite.config.js
          target: /app/vite.config.js
          action: restart

volumes:
  eluryn-db:
